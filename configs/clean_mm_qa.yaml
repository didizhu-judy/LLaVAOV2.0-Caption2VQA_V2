# OpenBee / clean_mm_qa: align with run_clean_openbee_with_sglang.sh defaults
task_name: clean_mm_qa
id_field: id
resume: true

num_workers: 8
fetch_batch_size: 32
worker_async_concurrency: 8
worker_queue_size: 256

output_jsonl: output/clean_mm_qa_judged.jsonl
error_jsonl: output/clean_mm_qa_errors.jsonl

dump_interval_sec: 30
dump_every_n: 200

endpoint_registry_file: scripts/env/endpoints.json
endpoint_group: sglang_openbee_8ports
route_strategy: least_inflight_weighted
route_failover: rotate_on_retry

llm_timeout_sec: 90
llm_max_retries: 3
llm_retry_backoff_sec: 1.0

ray_local_mode: false

task_config:
  input_jsonl: data/mmqa.jsonl
  input_dir: /ov2/dataset_jsonl/openbee
  judged_dir: /root/LLaVAOV2.0-Caption2VQA/output/openbee_judged
  output_clean_dir: /ov2/dataset_jsonl/openbee_clean
  output_dirty_dir: /ov2/dataset_jsonl/openbee_dirty
  max_records: 0
  model: Qwen/Qwen3-VL-30B-A3B-Instruct
  image_root: ""
  image_detail: low
  max_tokens: 512
  with_ppl: false
  clean_output_jsonl: output/mmqa_clean.jsonl
  dirty_output_jsonl: output/mmqa_dirty.jsonl
