# OpenBee / clean_mm_qa: align with run_clean_openbee_with_sglang.sh defaults
task_name: clean_mm_qa
id_field: id
resume: true

num_workers: 8
fetch_batch_size: 32
# 每 worker 并发请求数；8 实例时 8×8=64 总并发（过高会压垮 SGLang）
worker_async_concurrency: 8
worker_queue_size: 256

output_jsonl: output/clean_mm_qa_judged.jsonl
error_jsonl: output/clean_mm_qa_errors.jsonl

dump_interval_sec: 30
dump_every_n: 200

endpoint_registry_file: scripts/env/endpoints.json
endpoint_group: sglang_openbee_8ports
route_strategy: least_inflight_weighted
route_failover: rotate_on_retry

llm_timeout_sec: 90
llm_max_retries: 3
llm_retry_backoff_sec: 1.0

ray_local_mode: false

task_config:
  input_jsonl: data/mmqa.jsonl
  input_dir: /ov2/dataset_jsonl/openbee
  judged_dir: /root/LLaVAOV2.0-Caption2VQA/output/openbee_judged
  output_clean_dir: /ov2/dataset_jsonl/openbee_clean
  output_dirty_dir: /ov2/dataset_jsonl/openbee_dirty
  max_records: 0
  model: Qwen/Qwen3-VL-30B-A3B-Instruct
  image_root: ""
  # 法官需看清图内文字/框图细节才能正确判 relevance/necessity；low 易导致误判（如框图题判成 irrelevant）
  image_detail: high
  max_tokens: 1024
  # 分数阈值：relevance_score/necessity_score >= 对应阈值则该项通过，两项都通过才判 clean（默认 4，等价于原 relevant+necessary）
  relevance_keep_threshold: 4
  necessity_keep_threshold: 4
  with_ppl: false
  include_answer_in_judge: true
  # 服务端 prefill 上限；总 token 超限会 400。此处用于自动截断：预留 system+image 约 1100，剩余给 question+answer
  # 由 scripts/data/estimate_openbee_prefill_tokens.py 对 25 个 jsonl 前 100 条 QA 统计后建议；略保守 8192 减少 400
  max_prefill_tokens: 8192
  # 可选：显式限制 user 文本字符数，与 max_prefill_tokens 推导值取更严
  # max_user_text_chars: 0
  # 图片长边超过此值时先缩小再编码。法官需看清框图/公式/小字，过小会“没看清楚图”误判；建议 >= 1536（0=不缩放）
  max_image_longer_edge: 1536
  clean_output_jsonl: output/mmqa_clean.jsonl
  dirty_output_jsonl: output/mmqa_dirty.jsonl
